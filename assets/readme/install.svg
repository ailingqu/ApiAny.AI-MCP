<svg width="1040" height="520" viewBox="0 0 1040 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">APIAny MCP install screenshot</title>
  <desc id="desc">Terminal-style screenshot showing the npm and npx commands used to install and run APIAny MCP.</desc>
  <rect width="1040" height="520" rx="32" fill="#F7FAFC"/>
  <rect x="44" y="44" width="952" height="432" rx="24" fill="#0B1220" stroke="#1D2939"/>
  <rect x="44" y="44" width="952" height="58" rx="24" fill="#111827"/>
  <circle cx="82" cy="74" r="9" fill="#FF5F57"/>
  <circle cx="112" cy="74" r="9" fill="#FFBD2E"/>
  <circle cx="142" cy="74" r="9" fill="#28C840"/>
  <text x="520" y="82" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#F9FAFB">Terminal</text>
  <text x="82" y="148" font-family="JetBrains Mono, Menlo, monospace" font-size="20" fill="#6EE7B7">$ npm view @apiany-ai/mcp version</text>
  <text x="82" y="186" font-family="JetBrains Mono, Menlo, monospace" font-size="20" fill="#E5E7EB">0.1.0</text>
  <text x="82" y="246" font-family="JetBrains Mono, Menlo, monospace" font-size="20" fill="#6EE7B7">$ npx -y @apiany-ai/mcp</text>
  <text x="82" y="284" font-family="JetBrains Mono, Menlo, monospace" font-size="20" fill="#E5E7EB">APIAny MCP server is running on stdio</text>
  <text x="82" y="322" font-family="JetBrains Mono, Menlo, monospace" font-size="20" fill="#93C5FD">tools: list_models, search_models, estimate_cost, get_model_usage</text>
  <rect x="82" y="372" width="876" height="56" rx="14" fill="#172033" stroke="#344054"/>
  <text x="110" y="407" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#F9FAFB">Tip</text>
  <text x="158" y="407" font-family="Inter, Arial, sans-serif" font-size="17" fill="#D0D5DD">Use read-only tools without an API key. Paid media tools require explicit confirmation.</text>
</svg>
